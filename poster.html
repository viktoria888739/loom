<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-плакат — LOOM</title>
    <style>
        :root {
            --bg-color: #2d3e1d;
            --text-color: #ffffff;
            --accent-green: #7fa655;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(127,166,85,0.15) 0%, transparent 80%);
        }
        header {
            background-color: rgba(45, 62, 29, 0.9);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 15px 20px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }
        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s, border-bottom 0.3s;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #fff;
            border-bottom: 2px solid var(--accent-green);
        }
        main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 54px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #e2f0d9;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 40px;
        }
        footer {
            background-color: #1a2612;
            color: #fff;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 60px;
        }
        .footer-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .footer-logo { width: 70px; height: 70px; }
        .footer-info { line-height: 1.8; font-size: 14px; }
        .footer-info a { color: rgba(255, 255, 255, 0.8); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="about.html">О нас</a>
            <a href="journal.html">Журнал</a>
            <a href="location.html">Локация</a>
            <a href="events.html">Мероприятия</a>
            <a href="masterclass.html">Мастеркласс 2025</a>
            <a href="poster.html" class="active">Веб-плакат</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>ВЕБ-ПЛАКАТ</h1>
        </section>

        <section class="glass-card">
            <h2 style="font-weight:300;">Интерактивное арт-пространство</h2>
            <p style="opacity:0.7; font-size:15px; margin-top:15px;">Здесь будет размещен цифровой интерактивный плакат проекта LOOM.</p>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <svg class="footer-logo" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <circle cx="250" cy="250" r="230" fill="none" stroke="white" stroke-width="20"/>
                <polygon points="250,60 70,410 430,410" fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>
                <line x1="65" y1="355" x2="435" y2="355" stroke="white" stroke-width="20"/>
                <line x1="170" y1="200" x2="310" y2="340" stroke="white" stroke-width="20"/>
                <line x1="330" y1="200" x2="190" y2="340" stroke="white" stroke-width="20"/>
            </svg>
            <div class="footer-info">
                <div><a href="tel:+79299880138">+7(929)988-01-38</a></div>
                <div><a href="mailto:marina.zlatovlasova.08@inbox.ru">marina.zlatovlasova.08@inbox.ru</a></div>
            </div>
        </div>
    </footer>

</body>
</html>
